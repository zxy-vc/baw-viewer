<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALM809P — Viewer Multi-Scan</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #141414;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px 14px 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
    }
    #sidebar-header p {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    #scan-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    #scan-list::-webkit-scrollbar { width: 4px; }
    #scan-list::-webkit-scrollbar-track { background: transparent; }
    #scan-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .level-group { margin-bottom: 4px; }

    .level-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      padding: 8px 14px 4px;
    }

    .scan-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.15s;
      font-size: 12px;
      color: #b0b0b0;
      border-left: 3px solid transparent;
    }
    .scan-item:hover { background: #1e1e1e; color: #fff; }
    .scan-item.active {
      background: #1e2a3a;
      color: #60a5fa;
      border-left-color: #3b82f6;
    }
    .scan-item .scan-id {
      font-size: 10px;
      color: #444;
      font-family: monospace;
    }
    .scan-item.active .scan-id { color: #2563eb; }

    /* ── Controls bar ── */
    #controls {
      padding: 10px 14px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    button {
      width: 100%;
      padding: 7px 12px;
      background: #1f1f1f;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    button:hover { background: #2a2a2a; color: #fff; }
    button.active { background: #1e3a5f; border-color: #3b82f6; color: #60a5fa; }

    /* ── Viewport ── */
    #viewport {
      flex: 1;
      position: relative;
      background: #111;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── Spinner ── */
    #spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 10;
      flex-direction: column;
      gap: 12px;
    }
    #spinner.visible { display: flex; }
    .spin-ring {
      width: 48px;
      height: 48px;
      border: 3px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #spinner p { font-size: 13px; color: #aaa; }

    /* ── Empty state ── */
    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #333;
      pointer-events: none;
    }
    #empty-state .icon { font-size: 48px; }
    #empty-state p { font-size: 14px; }

    /* ── Info badge ── */
    #info-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #888;
      display: none;
    }
    #info-badge.visible { display: block; }
    #info-badge strong { color: #ccc; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>🏗️ ALM809P</h1>
    <p>Viewer LiDAR · 20 scans</p>
  </div>

  <nav id="scan-list">
    <!-- Generated by JS -->
  </nav>

  <div id="controls">
    <button id="btn-reset">↺ Reset Cámara</button>
    <button id="btn-wire">⬡ Wireframe</button>
  </div>
</aside>

<!-- ── Viewport ── -->
<div id="viewport">
  <div id="empty-state">
    <div class="icon">🏢</div>
    <p>Selecciona un scan del panel izquierdo</p>
  </div>
  <div id="spinner">
    <div class="spin-ring"></div>
    <p id="spinner-label">Cargando mesh…</p>
  </div>
  <div id="info-badge"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

// ── Scan catalogue ─────────────────────────────────────────────────────────
const LEVELS = [
  {
    icon: '🅿️',
    label: 'N-1 · Estacionamiento',
    scans: [
      { id: 'S26', folder: 'S26_N-1_E_P2',       name: 'Estacionamiento P2' },
      { id: 'S27', folder: 'S27_N-1_E_P3',       name: 'Estacionamiento P3' },
      { id: 'S29', folder: 'S29_N-1_E_P5',       name: 'Estacionamiento P5' },
      { id: 'S30', folder: 'S30_N-1_E_P6',       name: 'Estacionamiento P6' },
    ]
  },
  {
    icon: '🏢',
    label: 'N0 · Planta Baja',
    scans: [
      { id: 'S01', folder: 'S01_N0_Vestibulo',    name: 'Vestíbulo' },
      { id: 'S02', folder: 'S02_N0_Fachada',      name: 'Fachada Exterior' },
      { id: 'S04', folder: 'S04_N0_Local1_P2',    name: 'Local 1 · P2' },
      { id: 'S05', folder: 'S05_N0_Local2_P1',    name: 'Local 2 · P1' },
      { id: 'S06', folder: 'S06_N0_Local2_P2',    name: 'Local 2 · P2' },
      { id: 'S07', folder: 'S07_N0_Local2_P3',    name: 'Local 2 · P3' },
    ]
  },
  {
    icon: '🏠',
    label: 'N1 · Primer Piso',
    scans: [
      { id: 'S09', folder: 'S09_N1-N5_Escaleras_P2', name: 'Escaleras (N1–N5)' },
      { id: 'S12', folder: 'S12_N1_D103_P1',      name: 'Depto 103 · P1' },
      { id: 'S13', folder: 'S13_N1_D103_P2',      name: 'Depto 103 · P2' },
      { id: 'S14', folder: 'S14_N1_Fachada_Exterior', name: 'Fachada Exterior N1' },
      { id: 'S16', folder: 'S16_N1_D102_P2',      name: 'Depto 102 · P2' },
    ]
  },
  {
    icon: '🏠',
    label: 'N2 · Segundo Piso',
    scans: [
      { id: 'S21', folder: 'S21_N2_D202_P1',      name: 'Depto 202 · P1' },
      { id: 'S22', folder: 'S22_N2_D201_P2',      name: 'Depto 201 · P2' },
      { id: 'S23', folder: 'S23_N2_D202',         name: 'Depto 202' },
    ]
  },
  {
    icon: '🏠',
    label: 'N3 · Tercer Piso',
    scans: [
      { id: 'S19', folder: 'S19_N3_D304',         name: 'Depto 304' },
    ]
  },
  {
    icon: '🏠',
    label: 'N4 · Cuarto Piso',
    scans: [
      { id: 'S24', folder: 'S24_N4_D403',         name: 'Depto 403' },
    ]
  },
];

// ── Build sidebar ───────────────────────────────────────────────────────────
const scanList = document.getElementById('scan-list');

LEVELS.forEach(level => {
  const group = document.createElement('div');
  group.className = 'level-group';

  const label = document.createElement('div');
  label.className = 'level-label';
  label.textContent = `${level.icon} ${level.label}`;
  group.appendChild(label);

  level.scans.forEach(scan => {
    const item = document.createElement('div');
    item.className = 'scan-item';
    item.dataset.folder = scan.folder;
    item.innerHTML = `<span>${scan.name}</span><span class="scan-id">${scan.id}</span>`;
    item.addEventListener('click', () => loadScan(scan));
    group.appendChild(item);
  });

  scanList.appendChild(group);
});

// ── Three.js setup ──────────────────────────────────────────────────────────
const viewport = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
viewport.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, viewport.clientWidth / viewport.clientHeight, 0.01, 1000);
camera.position.set(0, 2, 5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = false;
controls.minDistance = 0.1;
controls.maxDistance = 200;

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.3);
dirLight2.position.set(-5, -5, -5);
scene.add(dirLight2);

// Grid helper
const grid = new THREE.GridHelper(20, 20, 0x222222, 0x222222);
scene.add(grid);

// Animate
let animId;
function animate() {
  animId = requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
const ro = new ResizeObserver(() => {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});
ro.observe(viewport);

// ── State ───────────────────────────────────────────────────────────────────
let currentObject = null;
let wireframeOn = false;
let savedCamPos = null, savedCamTarget = null;

// ── Load scan ───────────────────────────────────────────────────────────────
function showSpinner(label) {
  const s = document.getElementById('spinner');
  document.getElementById('spinner-label').textContent = label || 'Cargando mesh…';
  s.classList.add('visible');
}
function hideSpinner() {
  document.getElementById('spinner').classList.remove('visible');
}

function loadScan(scan) {
  // Highlight active
  document.querySelectorAll('.scan-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-folder="${scan.folder}"]`)?.classList.add('active');

  document.getElementById('empty-state').style.display = 'none';
  showSpinner(`Cargando ${scan.name}…`);

  const basePath = `scans/${scan.folder}/`;
  const mtlPath  = `${basePath}ReprocessedMesh.mtl`;
  const objPath  = `${basePath}ReprocessedMesh.obj`;

  const mtlLoader = new MTLLoader();
  mtlLoader.setPath(basePath);          // textures resolved relative to scan folder
  mtlLoader.load(
    mtlPath,
    (materials) => {
      materials.preload();
      const objLoader = new OBJLoader();
      objLoader.setMaterials(materials);
      objLoader.load(
        objPath,
        (object) => {
          // Remove previous
          if (currentObject) {
            scene.remove(currentObject);
            currentObject.traverse(child => {
              if (child.isMesh) {
                child.geometry.dispose();
                if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                else child.material.dispose();
              }
            });
          }

          // Center & scale
          const box = new THREE.Box3().setFromObject(object);
          const center = new THREE.Vector3();
          box.getCenter(center);
          const size = new THREE.Vector3();
          box.getSize(size);
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 5 / maxDim;
          object.scale.setScalar(scale);
          object.position.sub(center.multiplyScalar(scale));

          // Apply wireframe state
          if (wireframeOn) applyWireframe(object, true);

          scene.add(object);
          currentObject = object;

          // Reposition grid
          const newBox = new THREE.Box3().setFromObject(object);
          grid.position.y = newBox.min.y;

          // Reset camera nicely
          const newSize = new THREE.Vector3();
          newBox.getSize(newSize);
          const newCenter = new THREE.Vector3();
          newBox.getCenter(newCenter);
          const dist = Math.max(newSize.x, newSize.y, newSize.z) * 1.5;
          camera.position.set(newCenter.x + dist * 0.6, newCenter.y + dist * 0.5, newCenter.z + dist);
          controls.target.copy(newCenter);
          controls.update();

          savedCamPos = camera.position.clone();
          savedCamTarget = controls.target.clone();

          // Info badge
          const badge = document.getElementById('info-badge');
          badge.innerHTML = `<strong>${scan.name}</strong><br><span style="color:#555">${scan.folder}</span>`;
          badge.classList.add('visible');

          hideSpinner();
        },
        (xhr) => {
          if (xhr.total) {
            const pct = Math.round(xhr.loaded / xhr.total * 100);
            document.getElementById('spinner-label').textContent = `Cargando mesh… ${pct}%`;
          }
        },
        (err) => {
          console.error('OBJ load error', err);
          hideSpinner();
        }
      );
    },
    undefined,
    (err) => {
      console.warn('MTL load failed, trying OBJ without materials', err);
      // Fallback: load OBJ without materials
      const objLoader = new OBJLoader();
      objLoader.load(
        objPath,
        (object) => {
          if (currentObject) {
            scene.remove(currentObject);
            currentObject.traverse(child => {
              if (child.isMesh) {
                child.geometry.dispose();
                if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                else child.material.dispose();
              }
            });
          }
          const defaultMat = new THREE.MeshStandardMaterial({ color: 0x888888, side: THREE.DoubleSide });
          object.traverse(child => {
            if (child.isMesh) child.material = defaultMat;
          });

          const box = new THREE.Box3().setFromObject(object);
          const center = new THREE.Vector3();
          box.getCenter(center);
          const size = new THREE.Vector3();
          box.getSize(size);
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 5 / maxDim;
          object.scale.setScalar(scale);
          object.position.sub(center.multiplyScalar(scale));

          if (wireframeOn) applyWireframe(object, true);

          scene.add(object);
          currentObject = object;

          const newBox = new THREE.Box3().setFromObject(object);
          grid.position.y = newBox.min.y;
          const newSize = new THREE.Vector3(); newBox.getSize(newSize);
          const newCenter = new THREE.Vector3(); newBox.getCenter(newCenter);
          const dist = Math.max(newSize.x, newSize.y, newSize.z) * 1.5;
          camera.position.set(newCenter.x + dist * 0.6, newCenter.y + dist * 0.5, newCenter.z + dist);
          controls.target.copy(newCenter);
          controls.update();
          savedCamPos = camera.position.clone();
          savedCamTarget = controls.target.clone();

          const badge = document.getElementById('info-badge');
          badge.innerHTML = `<strong>${scan.name}</strong><br><span style="color:#555">${scan.folder}</span>`;
          badge.classList.add('visible');

          hideSpinner();
        },
        undefined,
        (err2) => { console.error('OBJ fallback error', err2); hideSpinner(); }
      );
    }
  );
}

// ── Wireframe helper ────────────────────────────────────────────────────────
function applyWireframe(obj, value) {
  obj.traverse(child => {
    if (child.isMesh) {
      if (Array.isArray(child.material))
        child.material.forEach(m => m.wireframe = value);
      else
        child.material.wireframe = value;
    }
  });
}

// ── Buttons ─────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  if (savedCamPos && savedCamTarget) {
    camera.position.copy(savedCamPos);
    controls.target.copy(savedCamTarget);
    controls.update();
  }
});

document.getElementById('btn-wire').addEventListener('click', function() {
  wireframeOn = !wireframeOn;
  this.classList.toggle('active', wireframeOn);
  if (currentObject) applyWireframe(currentObject, wireframeOn);
});
</script>
</body>
</html>
