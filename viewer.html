<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALM809P — Viewer 3D por Nivel | BaW Lab</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #eee; font-family: 'Helvetica Neue', sans-serif; display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 200px; background: #111; border-right: 1px solid #222; padding: 16px; flex-shrink: 0; overflow-y: auto; }
#sidebar h2 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 16px; }
.level-group { margin-bottom: 12px; }
.level-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.scan-btn { display: block; width: 100%; text-align: left; padding: 8px 10px; background: #1a1a1a; border: 1px solid #2a2a2a; color: #999; border-radius: 5px; cursor: pointer; font-size: 12px; transition: all .15s; margin-bottom: 3px; }
.scan-btn:hover { background: #222; border-color: #444; color: #eee; }
.scan-btn.active { background: #1a2f4f; border-color: #2563eb; color: #fff; }
#viewer { flex: 1; position: relative; }
canvas { display: block; }
#loading { position: absolute; inset: 0; background: rgba(0,0,0,.85); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
#loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
#progress-text { font-size: 13px; color: #888; }
@keyframes spin { to { transform: rotate(360deg); } }
#scan-name { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,.7); padding: 5px 12px; border-radius: 4px; font-size: 12px; color: #ccc; }
#controls { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
.ctrl-btn { padding: 5px 10px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: #ccc; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all .15s; }
.ctrl-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
#status { position: absolute; bottom: 10px; left: 12px; font-size: 11px; color: #444; }
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="sidebar">
  <h2>ALM809P</h2>
  <div class="level-group">
    <div class="level-label">🅿️ Sótano</div>
    <button class="scan-btn" data-scan="N-1_Estacionamiento">Estacionamiento</button>
  </div>
  <div class="level-group">
    <div class="level-label">🏢 Planta Baja</div>
    <button class="scan-btn" data-scan="N0_Planta_Baja">Planta Baja</button>
  </div>
  <div class="level-group">
    <div class="level-label">🏠 Piso 1</div>
    <button class="scan-btn" data-scan="N1_Piso1">Piso 1</button>
  </div>
  <div class="level-group">
    <div class="level-label">🏠 Piso 2</div>
    <button class="scan-btn" data-scan="N2_Piso2">Piso 2</button>
  </div>
  <div class="level-group">
    <div class="level-label">🏠 Piso 3</div>
    <button class="scan-btn" data-scan="N3_Piso3">D304</button>
  </div>
  <div class="level-group">
    <div class="level-label">🏠 Piso 4</div>
    <button class="scan-btn" data-scan="N4_Piso4">D403</button>
  </div>
</div>
<div id="viewer">
  <div id="scan-name">← Selecciona un nivel</div>
  <div id="controls">
    <button class="ctrl-btn" id="resetCam">Reset</button>
    <button class="ctrl-btn" id="wireBtn">Wireframe</button>
  </div>
  <div id="loading"><div class="spinner"></div><div id="progress-text">Cargando modelo…</div></div>
  <div id="status">🖱 Orbitar: click+drag · Zoom: scroll · Pan: shift+drag</div>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const RELEASE_BASE = 'https://github.com/zxy-vc/baw-viewer/releases/download/v1.0-scans';

const viewer = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(60, viewer.clientWidth / viewer.clientHeight, 0.01, 500);
camera.position.set(5, 4, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(3, 8, 5);
scene.add(dir);
scene.add(new THREE.HemisphereLight(0x8090b0, 0x303040, 0.4));
scene.add(new THREE.GridHelper(30, 30, 0x1a1a1a, 0x141414));

let current = null, wireMode = false, defCamPos, defTarget;

function loadLevel(name) {
  const loading = document.getElementById('loading');
  const prog = document.getElementById('progress-text');
  const nameEl = document.getElementById('scan-name');
  loading.style.display = 'flex';
  prog.textContent = 'Descargando…';
  nameEl.textContent = name.replace(/_/g, ' ');
  if (current) { scene.remove(current); current = null; }

  const url = `${RELEASE_BASE}/${name}.obj`;
  new OBJLoader().load(url, (obj) => {
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    obj.position.sub(center);
    obj.position.y = -box.min.y;
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 8 / maxDim;
    obj.scale.setScalar(scale);
    obj.traverse(c => { if (c.isMesh) { c.material = new THREE.MeshLambertMaterial({ color: 0xd4c8b8 }); c.material.side = THREE.DoubleSide; }});
    current = obj;
    scene.add(obj);
    const d = maxDim * scale;
    camera.position.set(d, d * 0.7, d);
    controls.target.set(0, d * 0.2, 0);
    controls.update();
    defCamPos = camera.position.clone();
    defTarget = controls.target.clone();
    if (wireMode) applyWire(true);
    loading.style.display = 'none';
  }, (e) => {
    if (e.total) prog.textContent = `${Math.round(e.loaded/e.total*100)}%`;
  }, (err) => {
    prog.textContent = 'Error cargando modelo';
    console.error(err);
  });
}

function applyWire(on) {
  if (!current) return;
  current.traverse(c => {
    if (!c.isMesh) return;
    if (on) { c.userData._m = c.material; c.material = new THREE.MeshBasicMaterial({color: 0x3b82f6, wireframe: true}); }
    else if (c.userData._m) c.material = c.userData._m;
  });
}

document.getElementById('wireBtn').addEventListener('click', () => {
  wireMode = !wireMode;
  applyWire(wireMode);
  document.getElementById('wireBtn').textContent = wireMode ? 'Sólido' : 'Wireframe';
});
document.getElementById('resetCam').addEventListener('click', () => {
  if (!defCamPos) return;
  camera.position.copy(defCamPos);
  controls.target.copy(defTarget);
  controls.update();
});
document.querySelectorAll('.scan-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.scan-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    wireMode = false;
    document.getElementById('wireBtn').textContent = 'Wireframe';
    loadLevel(b.dataset.scan);
  });
});
window.addEventListener('resize', () => {
  camera.aspect = viewer.clientWidth / viewer.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});
(function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
